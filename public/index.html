    // ==================================================================
    // BOSS STATE UPDATE (shared between canvas and DOM)
    // ==================================================================
    function getBossSpriteFile(killCount) {
      const idx = (killCount || 0) % NUM_BOSS_TYPES;
      return `sprites/boss-${idx + 1}.png`;
    }

    function updateBossState(boss) {
      if (!boss) return;
      bossState = boss;

      const pct = Math.max(0, (boss.currentHP / boss.maxHP) * 100);

      // Status panel update
      bossStatusName.textContent = boss.name;
      bossBarFill.style.width = pct + '%';
      setTimeout(() => { bossBarGhost.style.width = pct + '%'; }, 50);
      bossHpNumbers.textContent = `HP ${Math.max(0, boss.currentHP)} / ${boss.maxHP}`;
      bossKillCount.textContent = `Slain: ${boss.killCount}`;
      killCountEl.textContent = boss.killCount;

      // DOM fallback
      if (!useCanvas) {
        bossNameDom.textContent = boss.name;
        const spriteFile = getBossSpriteFile(boss.killCount);
        bossSprite.style.backgroundImage = `url('${spriteFile}')`;
        bossHpFillDom.style.width = pct + '%';
        setTimeout(() => { bossHpGhostDom.style.width = pct + '%'; }, 50);
        bossHpTextDom.textContent = `${Math.max(0, boss.currentHP)} / ${boss.maxHP}`;
        bossMetaDom.textContent = `Kill Count: ${boss.killCount}`;
      }
    }

    // ==================================================================
    // PARTY MANAGEMENT
    // ==================================================================
    function updatePartyCount() {
      const count = party.size;
      partyCountEl.textContent = count;

      if (useCanvas) {
        emptyStatus.style.display = count > 0 ? 'none' : 'flex';
      } else {
        emptyParty.style.display = count > 0 ? 'none' : 'flex';
      }
    }

    // Status panel row management
    function createPartyRow(task) {
      const row = document.createElement('div');
      row.className = 'party-row';
      row.dataset.taskId = task.id;

      const char = task.character || {};

      row.innerHTML = `
        <span class="party-row-name" style="color: ${char.color || '#C8B458'}">${escapeHtml(char.name || 'Unknown')}</span>
        <div class="atb-gauge"><div class="atb-fill" data-atb-fill></div></div>
        <span class="party-row-class">${escapeHtml(char.class || 'warrior')}</span>
        <span class="party-row-task">${escapeHtml(task.name || '')}</span>
      `;

      return row;
    }

    function rebuildStatusPanel() {
      // Clear existing rows
      const existing = partyRows.querySelectorAll('.party-row');
      existing.forEach(r => r.remove());

      let index = 0;
      for (const [, entry] of party) {
        const row = createPartyRow(entry.task);
        partyRows.appendChild(row);
        entry.rowEl = row;
        if (entry.canvasChar) {
          entry.canvasChar.index = index;
          const pos = getPartyPosition(index);
          entry.canvasChar.homeX = pos.x;
          entry.canvasChar.homeY = pos.y;
          if (entry.canvasChar.state === CHAR_IDLE) {
            entry.canvasChar.x = pos.x;
            entry.canvasChar.y = pos.y;
          }
        }
        index++;
      }

      emptyStatus.style.display = party.size > 0 ? 'none' : 'flex';
    }

    function summonCharacter(task) {
      if (party.has(task.id)) return;

      const index = party.size;

      if (useCanvas) {
        const canvasChar = new CanvasCharacter(task, index);
        const rowEl = createPartyRow(task);
        partyRows.appendChild(rowEl);
        party.set(task.id, { task, canvasChar, rowEl });
      } else {
        // DOM fallback
        const slot = document.createElement('div');
        slot.className = 'character-slot summoning';
        slot.dataset.taskId = task.id;
        const char = task.character || {};
        const sprite = document.createElement('div');
        sprite.className = 'character idle';
        sprite.style.backgroundImage = `url('sprites/${char.sprite || 'warrior.png'}')`;
        slot.appendChild(sprite);
        const info = document.createElement('div');
        info.className = 'character-info';
        info.innerHTML = `
          <div class="character-name" style="color: ${char.color || '#c4a35a'}">${escapeHtml(char.name || 'Unknown')}</div>
          <div class="character-class">${escapeHtml(char.class || 'warrior')}</div>
          <div class="character-task">${escapeHtml(task.name || '')}</div>
        `;
        slot.appendChild(info);
        partyArea.appendChild(slot);
        party.set(task.id, { task, element: slot, spriteEl: sprite });
        slot.addEventListener('animationend', () => slot.classList.remove('summoning'), { once: true });
      }

      updatePartyCount();
      playSummonSound();
    }

    function unsummonCharacter(taskId) {
      const entry = party.get(taskId);
      if (!entry) return;

      if (useCanvas && entry.canvasChar) {
        entry.canvasChar.unsummoning = true;
        // Remove row from status panel
        if (entry.rowEl) entry.rowEl.remove();
      } else if (entry.element) {
        // DOM fallback
        entry.element.classList.add('unsummoning');
        entry.element.addEventListener('animationend', () => {
          entry.element.remove();
          party.delete(taskId);
          updatePartyCount();
        }, { once: true });
        return; // Don't delete from map yet — wait for animation
      }

      playUnsummonSound();
    }

    // ==================================================================
    // ATB GAUGE UPDATES
    // ==================================================================
    function updateATBGauges(gauges) {
      if (!gauges) return;
      for (const [taskId, value] of Object.entries(gauges)) {
        const entry = party.get(taskId);
        if (!entry) continue;

        // Find the ATB fill element in the party row
        const rowEl = entry.rowEl;
        if (!rowEl) continue;
        const fill = rowEl.querySelector('[data-atb-fill]');
        if (!fill) continue;

        const pct = Math.min(100, Math.max(0, value));
        fill.style.width = pct + '%';

        if (pct >= 100) {
          fill.classList.add('full');
        } else {
          fill.classList.remove('full');
        }
      }
    }

    // ==================================================================
    // DAMAGE PROCESSING
    // ==================================================================
    let damageQueue = [];
    let processingDamage = false;

    function processDamageQueue() {
      if (processingDamage || damageQueue.length === 0) return;
      processingDamage = true;

      const item = damageQueue.shift();

      // Update boss HP
      if (bossState) {
        bossState.currentHP = item.bossHP;
        bossState.maxHP = item.bossMaxHP;
        updateBossState(bossState);
      }

      if (useCanvas) {
        // Queue attack on the canvas character
        const entry = party.get(item.taskId);
        if (entry && entry.canvasChar) {
          entry.canvasChar.queueAttack(item);
        } else {
          // Character not found on canvas, just show damage
          spawnDamageNumber(item.amount, bossCanvasX + 60, bossCanvasY + 40, item.isCrit);
          if (item.isCrit) playCritSound();
          else playSlashSound();
        }
      } else {
        // DOM fallback
        triggerAttackDOM(item.taskId);
        showDamageNumberDOM(item.amount, item.isCrit);
        if (item.isCrit) playCritSound();
        else playSlashSound();
      }

      const delay = damageQueue.length > 0 ? 60 : 0;
      setTimeout(() => {
        processingDamage = false;
        if (damageQueue.length > 0) processDamageQueue();
      }, delay);
    }

    // DOM fallback damage rendering
    function triggerAttackDOM(taskId) {
      const entry = party.get(taskId);
      if (!entry || !entry.spriteEl) return;
      entry.spriteEl.classList.remove('idle');
      entry.spriteEl.classList.add('attacking');
      entry.spriteEl.addEventListener('animationend', () => {
        entry.spriteEl.classList.remove('attacking');
        entry.spriteEl.classList.add('idle');
      }, { once: true });
    }

    function showDamageNumberDOM(amount, isCrit) {
      const el = document.createElement('div');
      el.className = 'damage-number' + (isCrit ? ' crit' : '');
      el.textContent = isCrit ? amount + '!' : amount;
      const rect = (useCanvas ? canvasContainer : bossSprite).getBoundingClientRect();
      el.style.left = (rect.left + rect.width / 2 + (Math.random() - 0.5) * 80) + 'px';
      el.style.top = (rect.top + rect.height * 0.3 + (Math.random() - 0.5) * 40) + 'px';
      document.body.appendChild(el);
      el.addEventListener('animationend', () => el.remove());
    }

    // ==================================================================
    // BOSS DEATH / VICTORY
    // ==================================================================
    function showVictory() {
      if (useCanvas) {
        bossDying = true;
        bossDeathTimer = 0;
        bossOpacity = 1;
        triggerVictoryCanvas();
        playBossDeathSound();
        // Play fanfare after death sound
        setTimeout(() => playVictoryFanfare(), 800);
      } else {
        // DOM fallback
        const overlay = document.createElement('div');
        overlay.className = 'victory-overlay';
        overlay.innerHTML = '<div class="victory-text">VICTORY</div>';
        battleScene.appendChild(overlay);
        bossSprite.classList.add('dying');
        playBossDeathSound();
        setTimeout(() => playVictoryFanfare(), 800);
        overlay.querySelector('.victory-text').addEventListener('animationend', () => overlay.remove());
      }
    }

    function spawnNewBoss(boss) {
      if (useCanvas) {
        bossOpacity = 1;
        bossBrightness = 1;
        bossDying = false;
        bossDeathTimer = 0;
        bossShakeX = 0;
        bossShakeY = 0;
        bossIdleTime = 0;
      } else {
        bossSprite.classList.remove('dying');
        bossSprite.style.opacity = '1';
        bossSprite.style.transform = '';
      }
      // Rotate battle background for the new encounter
      rotateBackground();
      updateBossState(boss);
      playBossSpawnSound();
    }

    // ==================================================================
    // FULL SCENE SYNC
    // ==================================================================
    function syncScene(data) {
      // Clear existing party
      for (const [id, entry] of party) {
        if (entry.canvasChar) { /* will be garbage collected */ }
        if (entry.element) entry.element.remove();
        if (entry.rowEl) entry.rowEl.remove();
      }
      party.clear();

      // Rebuild party from active tasks
      const tasks = data.tasks || [];
      for (const task of tasks) {
        if (task.status === 'active') {
          summonCharacter(task);
        }
      }

      // Update boss
      if (data.boss) {
        updateBossState(data.boss);
      }

      // Restore ATB gauges
      if (data.gauges) {
        updateATBGauges(data.gauges);
      }

      updatePartyCount();
    }

    // ==================================================================
    // SSE CONNECTION
    // ==================================================================
    let eventSource = null;

    function connectSSE() {
      eventSource = new EventSource('/events');

      eventSource.addEventListener('message', (event) => {
        const data = JSON.parse(event.data);
        handleEvent(data);
      });

      eventSource.addEventListener('error', () => {
        if (eventSource.readyState === EventSource.CLOSED) {
          setTimeout(connectSSE, 2000);
        }
      });
    }

    function handleEvent(data) {
      switch (data.type) {
        case 'sync':
          syncScene(data);
          break;

        case 'task_start':
          summonCharacter(data.task);
          break;

        case 'task_complete':
          unsummonCharacter(data.task.id);
          break;

        case 'boss_damage':
          damageQueue.push(data);
          processDamageQueue();
          break;

        case 'boss_death':
          showVictory();
          killCountEl.textContent = data.killCount;
          break;

        case 'boss_spawn':
          spawnNewBoss(data.boss);
          break;

        case 'atb_update':
          updateATBGauges(data.gauges);
          break;
      }
    }

    // ==================================================================
    // FALLBACK: initial load via /tasks
    // ==================================================================
    async function initialLoad() {
      try {
        const res = await fetch('/tasks');
        const data = await res.json();
        if (data.tasks) {
          syncScene(data);
        }
      } catch (e) {
        console.error('Initial load failed:', e);
      }
    }

    // ==================================================================
    // RESIZE HANDLING
    // ==================================================================
    window.addEventListener('resize', () => {
      if (useCanvas) {
        resizeDisplayCanvas();
      }
    });

    // ==================================================================
    // UTILS
    // ==================================================================
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // ==================================================================
    // INIT
    // ==================================================================
    (async function init() {
      // Wait for sprites to load
      await Promise.all(spriteLoadPromises);

      // Try to init canvas
      if (initCanvas()) {
        canvasContainer.style.display = '';
        domFallback.classList.remove('active');
        initBackground();
        applyCRT();
        gameRunning = true;
        requestAnimationFrame(gameLoop);
      } else {
        // Canvas fallback
        useCanvas = false;
        canvasContainer.style.display = 'none';
        statusPanel.style.borderRadius = '12px';
        domFallback.classList.add('active');
      }

      initialLoad();
      connectSSE();
    })();
  </script>
</body>
</html>
