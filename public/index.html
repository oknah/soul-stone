    function generateCharacterSprite(className) {
      const pal = CLASS_PALETTES[className] || CLASS_PALETTES.warrior;
      const spriteData = CLASS_SPRITES[className] || CLASS_SPRITES.warrior;
      const W = 16, H = 16;

      const canvas = document.createElement('canvas');
      canvas.width = W * 6;
      canvas.height = H * 4;
      const ctx = canvas.getContext('2d');
      ctx.imageSmoothingEnabled = false;

      // Parse base idle pose with weapon/shield overlays
      const baseGrid = parseSpriteGrid(spriteData.idle);
      applyOverlays(baseGrid, spriteData.weaponIdle);
      if (spriteData.shieldIdle) applyOverlays(baseGrid, spriteData.shieldIdle);

      // --- ROW 0: Idle (6 frames, breathing bounce) ---
      const idleY = [0, 0, -1, -1, 0, 0];
      for (let f = 0; f < 6; f++) {
        let g = shiftGrid(baseGrid, 0, idleY[f]);
        g = addOutlines(g);
        drawSpriteFrame(ctx, g, pal, f * W, 0);
      }

      // --- ROW 1: Attack (4 frames: ready, windup, strike, recover) ---
      const atkS = [{dx:0,dy:0},{dx:-1,dy:-1},{dx:-2,dy:0},{dx:-1,dy:0}];
      for (let f = 0; f < 4; f++) {
        let g = parseSpriteGrid(spriteData.idle);
        if (spriteData.shieldIdle && f !== 2) applyOverlays(g, spriteData.shieldIdle);
        const aw = getAttackWeaponOverlay(className, f);
        g = shiftGrid(g, atkS[f].dx, atkS[f].dy);
        applyOverlays(g, aw.map(o => ({x:o.x+atkS[f].dx, y:o.y+atkS[f].dy, c:o.c})));
        g = addOutlines(g);
        drawSpriteFrame(ctx, g, pal, f * W, H);
      }

      // --- ROW 2: Hit (2 frames, recoil + white flash) ---
      for (let f = 0; f < 2; f++) {
        let g = parseSpriteGrid(spriteData.idle);
        applyOverlays(g, spriteData.weaponIdle);
        g = shiftGrid(g, f + 1, 0);
        g = addOutlines(g);
        drawSpriteFrame(ctx, g, pal, f * W, H * 2);
        if (f === 0) {
          ctx.fillStyle = 'rgba(255,255,255,0.3)';
          for (let y = 0; y < 16; y++) for (let x = 0; x < 16; x++) {
            if (g[y][x] !== '.' && g[y][x] !== 'O') ctx.fillRect(f*W+x, H*2+y, 1, 1);
          }
        }
      }

      // --- ROW 3: Death (4 frames: slump, lean, fall, fallen) ---
      for (let f = 0; f < 4; f++) {
        if (f < 3) {
          let g = parseSpriteGrid(spriteData.idle);
          applyOverlays(g, spriteData.weaponIdle);
          g = shiftGrid(g, f, f);
          g = addOutlines(g);
          const dim = 1.0 - f * 0.15;
          for (let y = 0; y < 16; y++) for (let x = 0; x < 16; x++) {
            if (g[y][x] === '.') continue;
            let c = resolveZoneColor(g[y][x], pal, x, y);
            if (c && dim < 1) c = darkenColor(c, dim);
            if (c) { ctx.fillStyle = c; ctx.fillRect(f*W+x, H*3+y, 1, 1); }
          }
        } else {
          // Fallen sideways on ground
          const dg = parseSpriteGrid(spriteData.idle);
          applyOverlays(dg, spriteData.weaponIdle);
          const drawn = Array.from({length:16}, () => Array(16).fill(false));
          for (let y = 0; y < 16; y++) for (let x = 0; x < 16; x++) {
            if (dg[y][x] === '.' || dg[y][x] === 'O') continue;
            const nx = Math.min(15, Math.max(0, y));
            const ny = Math.min(15, Math.max(0, 10 + Math.floor((15-x)/3)));
            let c = resolveZoneColor(dg[y][x], pal, x, y);
            if (c) { ctx.fillStyle = darkenColor(c, 0.55); ctx.fillRect(3*W+nx, H*3+ny, 1, 1); drawn[ny][nx] = true; }
          }
          // Outline for death frame
          const ol = pal.outline || '#000000';
          for (let y = 0; y < 16; y++) for (let x = 0; x < 16; x++) {
            if (drawn[y][x]) continue;
            for (let dy = -1; dy <= 1; dy++) for (let dx = -1; dx <= 1; dx++) {
              if (dy===0 && dx===0) continue;
              const ny=y+dy, nx=x+dx;
              if (ny>=0 && ny<16 && nx>=0 && nx<16 && drawn[ny][nx]) {
                ctx.fillStyle = ol; ctx.fillRect(3*W+x, H*3+y, 1, 1); dy=2; break;
              }
            }
          }
        }
      }

      const img = new Image();
      img.src = canvas.toDataURL('image/png');
      return img;
    }

    let procSpriteCounter = 0;

    function initCanvas() {
      try {
        displayCtx = displayCanvas.getContext('2d');
        if (!displayCtx) throw new Error('no 2d context');

        offscreen = document.createElement('canvas');
        offscreen.width = GAME_W;
        offscreen.height = GAME_H;
        gameCtx = offscreen.getContext('2d');
        gameCtx.imageSmoothingEnabled = false;

        resizeDisplayCanvas();
        useCanvas = true;
        return true;
      } catch (e) {
        useCanvas = false;
        return false;
      }
    }

    function resizeDisplayCanvas() {
      if (!displayCtx) return;
      const rect = canvasContainer.getBoundingClientRect();
      const scaleX = Math.floor(rect.width / GAME_W) || 1;
      const scaleY = Math.floor(rect.height / GAME_H) || 1;
      const scale = Math.max(1, Math.min(scaleX, scaleY));

      displayCanvas.width = GAME_W * scale;
      displayCanvas.height = GAME_H * scale;
      displayCtx.imageSmoothingEnabled = false;
    }

    // ==================================================================
    // BATTLE BACKGROUND (image-based with procedural fallback)
    // ==================================================================

    // Background image paths (CC0 licensed from OpenGameArt)
    const BG_IMAGE_PATHS = [
      'backgrounds/nightBackground.png',
      'backgrounds/fallbackground.png',
      'backgrounds/background.png',
      'backgrounds/snowbackground_001.png',
      'backgrounds/snowbackground_002.png',
      'backgrounds/snowbackground_003.png',
    ];

    const bgImages = [];        // loaded Image objects
    let bgImagesLoaded = false;
    let currentBgIndex = 0;

    // Load all background images
    function loadBackgroundImages() {
      let loaded = 0;
      const total = BG_IMAGE_PATHS.length;
      for (const path of BG_IMAGE_PATHS) {
        const img = new Image();
        img.onload = () => {
          loaded++;
          if (loaded === total) bgImagesLoaded = true;
        };
        img.onerror = () => {
          loaded++;
          // Mark as null so we skip it
          const idx = bgImages.indexOf(img);
          if (idx !== -1) bgImages[idx] = null;
          if (loaded === total) bgImagesLoaded = true;
        };
        img.src = path;
        bgImages.push(img);
      }
    }

    // Rotate to next background (called on boss spawn)
    function rotateBackground() {
      const validIndices = bgImages.map((img, i) => img ? i : -1).filter(i => i !== -1);
      if (validIndices.length === 0) return;
      // Pick next valid index, wrapping around
      const currentPos = validIndices.indexOf(currentBgIndex);
      const nextPos = (currentPos + 1) % validIndices.length;
      currentBgIndex = validIndices[nextPos];
    }

    // Procedural fallback: starfield + nebulae
    const bgStars = [];
    const bgNebulae = [];

    function initBackground() {
      // Load background images
      loadBackgroundImages();

      // Also init procedural fallback
      bgStars.length = 0;
      bgNebulae.length = 0;
      for (let i = 0; i < 120; i++) {
        bgStars.push({
          x: Math.random() * GAME_W,
          y: Math.random() * GAME_H,
          size: Math.random() * 2 + 0.5,
          speed: Math.random() * 0.5 + 0.1,
          brightness: Math.random() * 155 + 100,
        });
      }
      for (let i = 0; i < 5; i++) {
        bgNebulae.push({
          x: Math.random() * GAME_W,
          y: Math.random() * GAME_H,
          radius: Math.random() * 60 + 30,
          r: Math.floor(Math.random() * 60 + 20),
          g: Math.floor(Math.random() * 30),
          b: Math.floor(Math.random() * 80 + 40),
          speed: Math.random() * 0.2 + 0.05,
        });
      }
    }

    function renderProceduralBackground(ctx, time) {
      // Dark gradient base
      const grad = ctx.createLinearGradient(0, 0, 0, GAME_H);
      grad.addColorStop(0, '#0a0020');
      grad.addColorStop(0.5, '#150040');
      grad.addColorStop(1, '#0d0030');
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, GAME_W, GAME_H);

      // Nebulae
      for (const n of bgNebulae) {
        const ny = ((n.y + time * n.speed * 0.01) % (GAME_H + n.radius * 2)) - n.radius;
        const g = ctx.createRadialGradient(n.x, ny, 0, n.x, ny, n.radius);
        g.addColorStop(0, `rgba(${n.r},${n.g},${n.b},0.15)`);
        g.addColorStop(1, 'transparent');
        ctx.fillStyle = g;
        ctx.fillRect(n.x - n.radius, ny - n.radius, n.radius * 2, n.radius * 2);
      }

      // Stars
      for (const s of bgStars) {
        const sy = ((s.y + time * s.speed * 0.02) % GAME_H);
        const twinkle = Math.sin(time * 0.003 + s.x) * 30;
        const b = Math.floor(Math.min(255, s.brightness + twinkle));
        ctx.fillStyle = `rgb(${b},${b},${Math.min(255, b + 30)})`;
        ctx.fillRect(Math.floor(s.x), Math.floor(sy), Math.ceil(s.size), Math.ceil(s.size));
      }
    }

    function renderBackground(ctx, time) {
      const img = bgImages[currentBgIndex];

      // Use image background if available, otherwise procedural fallback
      if (bgImagesLoaded && img && img.complete && img.naturalWidth > 0) {
        // Crop a section from the wide parallax image to fill 256x224.
        // Target aspect ratio is GAME_W/GAME_H (256/224 ~ 1.143).
        // Source images are very wide (parallax), so we pick a crop region
        // that matches the target aspect ratio and center it vertically.
        const targetAspect = GAME_W / GAME_H;
        const srcW = img.naturalWidth;
        const srcH = img.naturalHeight;

        // Crop height = full image height; crop width = height * targetAspect
        let cropH = srcH;
        let cropW = Math.floor(cropH * targetAspect);

        // If the image is narrower than the crop width, fit by width instead
        if (cropW > srcW) {
          cropW = srcW;
          cropH = Math.floor(srcW / targetAspect);
        }

        // Center the crop horizontally (with slow scroll over time for parallax feel)
        const maxScrollX = srcW - cropW;
        const scrollSpeed = 0.003; // pixels per ms of time
        const scrollX = maxScrollX > 0
          ? Math.floor((time * scrollSpeed) % (maxScrollX * 2))
          : 0;
        // Ping-pong scroll: go right then left
        const sx = scrollX <= maxScrollX ? scrollX : maxScrollX * 2 - scrollX;

        // Center crop vertically
        const sy = Math.floor((srcH - cropH) / 2);

        ctx.drawImage(img, sx, sy, cropW, cropH, 0, 0, GAME_W, GAME_H);

        // Apply a subtle dark vignette overlay for battle atmosphere
        const vignette = ctx.createRadialGradient(
          GAME_W / 2, GAME_H / 2, GAME_W * 0.3,
          GAME_W / 2, GAME_H / 2, GAME_W * 0.7
        );
        vignette.addColorStop(0, 'rgba(0,0,0,0)');
        vignette.addColorStop(1, 'rgba(0,0,0,0.5)');
        ctx.fillStyle = vignette;
        ctx.fillRect(0, 0, GAME_W, GAME_H);
      } else {
        // Procedural fallback (starfield + nebulae)
        renderProceduralBackground(ctx, time);
      }
    }

    // ==================================================================
    // CANVAS SPRITE RENDERER
    // ==================================================================
    function drawSprite(ctx, img, config, animRow, frame, destX, destY, scale, flipX) {
      if (!img) return;
      const fw = config.frameW;
      const fh = config.frameH;
      const sx = frame * fw;
      const sy = animRow * fh;

      ctx.save();
      if (flipX) {
        ctx.translate(destX + fw * scale, destY);
        ctx.scale(-1, 1);
        ctx.drawImage(img, sx, sy, fw, fh, 0, 0, fw * scale, fh * scale);
      } else {
        ctx.drawImage(img, sx, sy, fw, fh, destX, destY, fw * scale, fh * scale);
      }
      ctx.restore();
    }

    // ==================================================================
    // CANVAS PARTY CHARACTERS
    // ==================================================================
    // Party positions on canvas (right side, staggered like FF6)
    function getPartyPosition(index) {
      const baseX = GAME_W - 80;
      const baseY = 50;
      const stagger = [
        { x: 0, y: 0 },
        { x: 12, y: 30 },
        { x: -8, y: 60 },
        { x: 16, y: 90 },
        { x: -4, y: 120 },
        { x: 10, y: 140 },
        { x: -2, y: 160 },
        { x: 14, y: 180 },
      ];
      const s = stagger[index % stagger.length] || { x: 0, y: index * 28 };
      return { x: baseX + s.x, y: baseY + s.y };
    }

    // Character state machine states
    const CHAR_IDLE = 'IDLE';
    const CHAR_STEPPING_FORWARD = 'STEPPING_FORWARD';
    const CHAR_ATTACKING = 'ATTACKING';
    const CHAR_STEPPING_BACK = 'STEPPING_BACK';

    class CanvasCharacter {
      constructor(task, index) {
        this.task = task;
        this.index = index;
        const pos = getPartyPosition(index);
        this.homeX = pos.x;
        this.homeY = pos.y;
        this.x = pos.x;
        this.y = pos.y;
        this.state = CHAR_IDLE;
        this.stateTimer = 0;
        this.frame = Math.floor(Math.random() * 6); // Random start frame for variety
        this.animRow = 0; // idle
        this.scale = 3;
        this.opacity = 0;
        this.summonTimer = 600; // ms for summon fade-in
        this.brightness = 3; // Start bright for summon
        this.unsummoning = false;
        this.unsummonTimer = 0;
        this.attackQueue = []; // Queued attack data
        this.levelUpFlashTimer = 0; // Level-up white flash countdown
        // Generate a unique procedural sprite for this character
        const charClass = (task.character && task.character.class) || 'warrior';
        const uniqueKey = `proc_${charClass}_${procSpriteCounter++}`;
        spriteImages[uniqueKey] = generateCharacterSprite(charClass);
        this.spriteKey = uniqueKey;
      }

      queueAttack(data) {
        this.attackQueue.push(data);
      }

      update(dt) {
        // Summon animation
        if (this.summonTimer > 0) {
          this.summonTimer -= dt;
          const t = 1 - Math.max(0, this.summonTimer / 600);
          this.opacity = t;
          this.brightness = 1 + (1 - t) * 2;
          if (this.summonTimer <= 0) {
            this.opacity = 1;
            this.brightness = 1;
          }
          return;
        }

        // Unsummon animation
        if (this.unsummoning) {
          this.unsummonTimer += dt;
          const t = Math.min(1, this.unsummonTimer / 500);
          this.opacity = 1 - t;
          this.brightness = 1 + t * 2;
          return;
        }

        // Level-up flash decay
        if (this.levelUpFlashTimer > 0) {
          this.levelUpFlashTimer -= dt;
          this.brightness = 1 + (this.levelUpFlashTimer / 300) * 2;
          if (this.levelUpFlashTimer <= 0) {
            this.levelUpFlashTimer = 0;
            this.brightness = 1;
          }
        }

        // State machine
        switch (this.state) {
          case CHAR_IDLE:
            this.animRow = 0;
            // Check attack queue
            if (this.attackQueue.length > 0) {
              this.state = CHAR_STEPPING_FORWARD;
              this.stateTimer = 0;
              this.currentAttack = this.attackQueue.shift();
            }
            break;

          case CHAR_STEPPING_FORWARD:
            this.stateTimer += dt;
            const fwdProgress = Math.min(1, this.stateTimer / 150);
            // Lerp toward boss
            const targetX = bossCanvasX + 50;
            this.x = this.homeX + (targetX - this.homeX) * fwdProgress;
            if (fwdProgress >= 1) {
              this.state = CHAR_ATTACKING;
              this.stateTimer = 0;
              this.animRow = SPRITE_CONFIG.characters.rows.attack;
              this.frame = 0;
              // Trigger effects at attack moment
              if (this.currentAttack) {
                triggerCanvasAttackEffects(this.currentAttack, bossCanvasX, bossCanvasY);
              }
            }
            break;

          case CHAR_ATTACKING:
            this.stateTimer += dt;
            if (this.stateTimer >= 400) {
              this.state = CHAR_STEPPING_BACK;
              this.stateTimer = 0;
            }
            break;

          case CHAR_STEPPING_BACK:
            this.stateTimer += dt;
            const backProgress = Math.min(1, this.stateTimer / 300);
            this.x = this.homeX + (bossCanvasX + 50 - this.homeX) * (1 - backProgress);
            if (backProgress >= 1) {
              this.x = this.homeX;
              this.state = CHAR_IDLE;
              this.animRow = 0;
              this.currentAttack = null;
            }
            break;
        }
      }

      render(ctx) {
        if (this.opacity <= 0) return;
        const img = spriteImages[this.spriteKey];
        if (!img) return;

        ctx.save();
        ctx.globalAlpha = this.opacity;

        // Brightness filter via compositing
        if (this.brightness > 1.1) {
          // Draw normal first
          drawSprite(ctx, img, SPRITE_CONFIG.characters, this.animRow, this.frame,
            Math.floor(this.x), Math.floor(this.y), this.scale, true);
          // Overlay with lighter blend for brightness
          ctx.globalCompositeOperation = 'lighter';
          ctx.globalAlpha = Math.min(1, (this.brightness - 1) * 0.5) * this.opacity;
          drawSprite(ctx, img, SPRITE_CONFIG.characters, this.animRow, this.frame,
            Math.floor(this.x), Math.floor(this.y), this.scale, true);
          ctx.globalCompositeOperation = 'source-over';
        } else {
          drawSprite(ctx, img, SPRITE_CONFIG.characters, this.animRow, this.frame,
            Math.floor(this.x), Math.floor(this.y), this.scale, true);
        }

        ctx.restore();
      }
    }

    // ==================================================================
    // CANVAS BOSS
    // ==================================================================
    let bossCanvasX = 30;
    let bossCanvasY = 60;
    let bossFrame = 0;
    let bossDying = false;
    let bossDeathTimer = 0;
    let bossOpacity = 1;
    let bossBrightness = 1;
    let bossShakeX = 0;
    let bossShakeY = 0;

    function getBossSpriteKey(killCount) {
      const idx = ((killCount || 0) % NUM_BOSS_TYPES) + 1;
      return `boss-${idx}`;
    }

    // Boss idle animation time tracker (independent of frame count)
    let bossIdleTime = 0;

    // Loot drop animation state
    let lootDrop = null; // { type, name, description, color, timer, opacity }

    function renderBoss(ctx) {
      const key = getBossSpriteKey(bossState ? bossState.killCount : 0);
      const img = spriteImages[key];
      if (!img) return;

      const bossScale = 4;
      const spriteW = SPRITE_CONFIG.bosses.frameW * bossScale;
      const spriteH = SPRITE_CONFIG.bosses.frameH * bossScale;

      // --- Boss phase based on HP ratio ---
      const hpRatio = bossState ? (bossState.currentHP / bossState.maxHP) : 1;
      const hasShield = bossState && bossState.buff && bossState.buff.type === 'shield';
      const enraged = hpRatio <= (hasShield ? 0.35 : 0.5);    // Phase 2: enraged
      const critical = hpRatio <= (hasShield ? 0.15 : 0.25);   // Phase 3: critical/desperate

      // --- Programmatic idle animation ---
      // 1. Sinusoidal vertical bob — faster when enraged
      const bobAmplitude = critical ? 2.5 : enraged ? 2.0 : 1.5;
      const bobPeriod = critical ? 1200 : enraged ? 1500 : 2000;
      const bobOffset = Math.sin(bossIdleTime * (2 * Math.PI / bobPeriod)) * bobAmplitude;

      // 2. Subtle scaleY breathing — more intense when enraged
      const breathPeriod = critical ? 1800 : enraged ? 2200 : 3000;
      const breathAmp = critical ? 0.04 : enraged ? 0.03 : 0.02;
      const breathScale = 1.0 + breathAmp * Math.sin(bossIdleTime * (2 * Math.PI / breathPeriod));

      // 3. Shadow beneath boss: dark ellipse that syncs with bob
      const shadowCenterX = bossCanvasX + spriteW / 2;
      const shadowY = bossCanvasY + spriteH + 2; // Just below boss feet
      const shadowBaseWidth = spriteW * 0.5;
      // Shadow expands when boss bobs up, contracts when boss bobs down
      const shadowWidth = shadowBaseWidth + bobOffset * -2;
      const shadowHeight = 4;
      const shadowOpacity = (0.35 + bobOffset * -0.05) * bossOpacity;

      ctx.save();
      ctx.globalAlpha = Math.max(0, shadowOpacity);
      ctx.fillStyle = '#000';
      ctx.beginPath();
      ctx.ellipse(shadowCenterX, shadowY, Math.max(1, shadowWidth / 2), shadowHeight, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();

      // Compute final position with bob + shake
      const bx = Math.floor(bossCanvasX + bossShakeX);
      const by = Math.floor(bossCanvasY + bossShakeY + bobOffset);

      ctx.save();
      ctx.globalAlpha = bossOpacity;

      // Apply breathing scaleY around the boss's bottom-center
      // This makes the boss stretch/compress from the feet up
      const centerX = bx + spriteW / 2;
      const bottomY = by + spriteH;
      ctx.translate(centerX, bottomY);
      ctx.scale(1, breathScale * bossAttackScaleY);
      ctx.translate(-centerX, -bottomY);

      drawSprite(ctx, img, SPRITE_CONFIG.bosses, 0, bossFrame, bx, by, bossScale, false);

      // 4. Eye/rune glow pulse: subtle glow overlay using 'lighter' compositing
      const glowPeriod = 2500; // slightly offset from bob for organic feel
      const glowIntensity = 0.08 + 0.06 * Math.sin(bossIdleTime * (2 * Math.PI / glowPeriod));
      if (!bossDying && bossOpacity > 0.5) {
        ctx.globalCompositeOperation = 'lighter';
        ctx.globalAlpha = glowIntensity * bossOpacity;
        drawSprite(ctx, img, SPRITE_CONFIG.bosses, 0, bossFrame, bx, by, bossScale, false);
        ctx.globalCompositeOperation = 'source-over';
        ctx.globalAlpha = bossOpacity;
      }

      // Phase overlays — enrage (red tint) and critical (pulsing aura)
      if (enraged && !bossDying && bossOpacity > 0.5) {
        // Red tint overlay using 'multiply' isn't available, use 'source-atop' with red
        ctx.globalCompositeOperation = 'source-atop';
        const enrageIntensity = critical ? 0.25 : 0.15;
        ctx.globalAlpha = enrageIntensity * bossOpacity;
        ctx.fillStyle = critical ? '#FF2200' : '#FF4400';
        ctx.fillRect(bx, by, spriteW, spriteH);
        ctx.globalCompositeOperation = 'source-over';
        ctx.globalAlpha = bossOpacity;
      }

      if (critical && !bossDying && bossOpacity > 0.5) {
        // Pulsing aura glow around boss
        const auraPulse = 0.3 + 0.2 * Math.sin(bossIdleTime * (2 * Math.PI / 800));
        ctx.globalAlpha = auraPulse * bossOpacity;
        ctx.globalCompositeOperation = 'lighter';
        drawSprite(ctx, img, SPRITE_CONFIG.bosses, 0, bossFrame, bx, by, bossScale, false);
        // Additional red-shifted glow
        ctx.globalAlpha = auraPulse * 0.3 * bossOpacity;
        ctx.fillStyle = '#FF0000';
        ctx.fillRect(bx - 2, by - 2, spriteW + 4, spriteH + 4);
        ctx.globalCompositeOperation = 'source-over';
        ctx.globalAlpha = bossOpacity;
      }

      // Hit brightness flash (existing behavior preserved)
      if (bossBrightness > 1.1) {
        ctx.globalCompositeOperation = 'lighter';
        ctx.globalAlpha = Math.min(1, (bossBrightness - 1) * 0.5) * bossOpacity;
        drawSprite(ctx, img, SPRITE_CONFIG.bosses, 0, bossFrame, bx, by, bossScale, false);
        ctx.globalCompositeOperation = 'source-over';
      }

      ctx.restore();
    }

    // ==================================================================
    // LOOT DROP RENDERING
    // ==================================================================
    function updateLootDrop(dt) {
      if (!lootDrop) return;
      lootDrop.timer -= dt;
      if (lootDrop.timer <= 0) {
        lootDrop = null;
        return;
      }
      // Fade out in last 800ms
      if (lootDrop.timer < 800) {
        lootDrop.opacity = lootDrop.timer / 800;
      }
    }

    function renderLootDrop(ctx) {
      if (!lootDrop || lootDrop.opacity <= 0) return;

      const bossScale = 4;
      const spriteW = SPRITE_CONFIG.bosses.frameW * bossScale;
      const centerX = bossCanvasX + spriteW / 2;
      const baseY = bossCanvasY + 40;

      // Bouncing sine wave
      const bounce = Math.sin(lootDrop.timer * 0.008) * 6;
      const x = centerX;
      const y = baseY + bounce;

      ctx.save();
      ctx.globalAlpha = lootDrop.opacity;

      // Outer glow
      const glowPulse = 0.3 + 0.2 * Math.sin(lootDrop.timer * 0.01);
      ctx.globalAlpha = lootDrop.opacity * glowPulse;
      ctx.fillStyle = lootDrop.color;
      ctx.beginPath();
      ctx.arc(x, y, 14, 0, Math.PI * 2);
      ctx.fill();

      // Icon background (8x8 scaled 3x = 24x24 centered)
      ctx.globalAlpha = lootDrop.opacity;
      ctx.fillStyle = lootDrop.color;
      const size = 10;
      ctx.fillRect(x - size / 2, y - size / 2, size, size);

      // Inner border
      ctx.fillStyle = '#FFFFFF';
      ctx.fillRect(x - size / 2 + 1, y - size / 2 + 1, size - 2, size - 2);

      // Inner icon color fill
      ctx.fillStyle = lootDrop.color;
      ctx.fillRect(x - size / 2 + 2, y - size / 2 + 2, size - 4, size - 4);

      // Symbol detail (2-3 pixel marks)
      ctx.fillStyle = '#FFFFFF';
      if (lootDrop.type === 'strength') {
        // Circle/orb
        ctx.fillRect(x - 1, y - 2, 2, 1);
        ctx.fillRect(x - 2, y - 1, 4, 2);
        ctx.fillRect(x - 1, y + 1, 2, 1);
      } else if (lootDrop.type === 'speed') {
        // Lightning bolt
        ctx.fillRect(x, y - 2, 1, 2);
        ctx.fillRect(x - 1, y, 2, 1);
        ctx.fillRect(x - 1, y + 1, 1, 2);
      } else if (lootDrop.type === 'shield') {
        // Cross/shield
        ctx.fillRect(x - 1, y - 2, 2, 4);
        ctx.fillRect(x - 2, y - 1, 4, 2);
      } else if (lootDrop.type === 'luck') {
        // Coin circle
        ctx.fillRect(x - 1, y - 1, 2, 2);
      }

      // Item name text
      ctx.font = '5px PressStart2P, monospace';
      ctx.textAlign = 'center';
      ctx.fillStyle = lootDrop.color;
      ctx.strokeStyle = '#000000';
      ctx.lineWidth = 2;
      ctx.strokeText(lootDrop.name, x, y + 14);
      ctx.fillText(lootDrop.name, x, y + 14);

      ctx.restore();
    }

    // ==================================================================
    // COMBO SYSTEM
    // ==================================================================
    let comboCount = 0;
    let comboTimer = 0; // ms since last hit
    const COMBO_WINDOW = 500; // ms — hits within this window count as combo
    let comboDisplayTimer = 0;
    let comboDisplayText = '';
    let comboDisplayScale = 1;

    // Combo sparkles (for CHAIN 4+ hits)
    const MAX_COMBO_SPARKLES = 24;
    const comboSparkles = [];
    let comboSparklesActive = false;

    function spawnComboSparkles() {
      comboSparklesActive = true;
      for (let i = 0; i < MAX_COMBO_SPARKLES; i++) {
        let s = comboSparkles[i];
        if (!s) { s = {}; comboSparkles[i] = s; }
        s.active = true;
        s.x = Math.random() * GAME_W;
        s.y = Math.random() * GAME_H;
        s.size = 1 + Math.random() * 2;
        s.opacity = 0.8 + Math.random() * 0.2;
        s.age = 0;
        s.maxAge = 300 + Math.random() * 200;
        s.vy = -0.3 - Math.random() * 0.5;
        s.phase = Math.random() * Math.PI * 2;
      }
    }

    function updateComboSparkles(dt) {
      if (!comboSparklesActive) return;
      let anyActive = false;
      for (const s of comboSparkles) {
        if (!s || !s.active) continue;
        s.age += dt;
        s.y += s.vy * dt * 0.06;
        s.opacity = Math.max(0, 1 - s.age / s.maxAge);
        if (s.age >= s.maxAge) s.active = false;
        else anyActive = true;
      }
      if (!anyActive) comboSparklesActive = false;
    }

    function renderComboSparkles(ctx) {
      if (!comboSparklesActive) return;
      ctx.save();
      for (const s of comboSparkles) {
        if (!s || !s.active) continue;
        // Twinkle effect
        const twinkle = 0.5 + 0.5 * Math.sin(s.age * 0.02 + s.phase);
        ctx.globalAlpha = s.opacity * twinkle;
        ctx.fillStyle = '#FFFFFF';
        // Draw a small cross/star shape
        const sz = Math.ceil(s.size);
        const x = Math.floor(s.x);
        const y = Math.floor(s.y);
        ctx.fillRect(x, y, sz, sz);
        ctx.fillRect(x - 1, y + Math.floor(sz / 2), sz + 2, 1);
        ctx.fillRect(x + Math.floor(sz / 2), y - 1, 1, sz + 2);
      }
      ctx.restore();
    }

    function renderCombo(ctx) {
      if (comboDisplayTimer <= 0 || !comboDisplayText) return;

      ctx.save();

      // Fade out over the last 500ms
      let alpha = 1;
      if (comboDisplayTimer < 500) {
        alpha = comboDisplayTimer / 500;
      }
      ctx.globalAlpha = alpha;

      // Font size based on combo level
      let fontSize = 10;
      let fillColor = '#FFFFFF';
      let glowColor = 'rgba(255, 255, 255, 0.6)';

      if (comboDisplayText.startsWith('CHAIN')) {
        fontSize = 14;
        // Cycling rainbow
        const hue = (Date.now() * 0.18) % 360;
        fillColor = `hsl(${hue}, 100%, 70%)`;
        glowColor = `hsla(${hue}, 100%, 60%, 0.8)`;
      } else if (comboDisplayText === 'TRIPLE!') {
        fontSize = 12;
        fillColor = '#FFD700';
        glowColor = 'rgba(255, 215, 0, 0.7)';
      } else {
        fontSize = 10;
        fillColor = '#FFFFFF';
        glowColor = 'rgba(255, 255, 255, 0.6)';
      }

      ctx.font = fontSize + 'px PressStart2P, monospace';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';

      // Position: centered, slightly above boss
      const cx = GAME_W / 2;
      const cy = bossCanvasY - 8;

      // Apply scale animation
      ctx.translate(cx, cy);
      ctx.scale(comboDisplayScale, comboDisplayScale);

      // Glow
      ctx.shadowColor = glowColor;
      ctx.shadowBlur = 8;

      // Black outline (same pattern as VICTORY text)
      ctx.fillStyle = '#000';
      for (let ox = -1; ox <= 1; ox++) {
        for (let oy = -1; oy <= 1; oy++) {
          if (ox || oy) ctx.fillText(comboDisplayText, ox, oy);
        }
      }

      // Main text
      ctx.fillStyle = fillColor;
      ctx.fillText(comboDisplayText, 0, 0);

      ctx.restore();
    }

    // ==================================================================
    // CANVAS DAMAGE NUMBERS (pooled)
    // ==================================================================
    const MAX_DAMAGE_NUMBERS = 20;
    const damageNumberPool = [];

    function spawnDamageNumber(value, x, y, isCrit) {
      // Find inactive or create
      let dn = damageNumberPool.find(d => !d.active);
      if (!dn) {
        if (damageNumberPool.length >= MAX_DAMAGE_NUMBERS) {
          dn = damageNumberPool[0]; // Recycle oldest
        } else {
          dn = {};
          damageNumberPool.push(dn);
        }
      }
      dn.active = true;
      dn.value = value;
      dn.x = x + (Math.random() - 0.5) * 40;
      dn.y = y;
      dn.vy = -1.5;
      dn.opacity = 1;
      dn.isCrit = isCrit;
      dn.age = 0;
    }

    function updateDamageNumbers(dt) {
      for (const dn of damageNumberPool) {
        if (!dn.active) continue;
        dn.age += dt;
        dn.y += dn.vy;
        dn.vy -= 0.02; // decelerate
        if (dn.age > 400) {
          dn.opacity -= dt / 400;
        }
        if (dn.opacity <= 0 || dn.age > 800) {
          dn.active = false;
        }
      }
    }

    function renderDamageNumbers(ctx) {
      for (const dn of damageNumberPool) {
        if (!dn.active) continue;
        const text = dn.isCrit ? dn.value + '!' : String(dn.value);
        const fontSize = dn.isCrit ? 10 : 8;

        ctx.save();
        ctx.globalAlpha = Math.max(0, dn.opacity);
        ctx.font = `${fontSize}px PressStart2P, monospace`;
        ctx.textAlign = 'center';

        // Black outline (4 directions)
        ctx.fillStyle = '#000';
        ctx.fillText(text, dn.x - 1, dn.y);
        ctx.fillText(text, dn.x + 1, dn.y);
        ctx.fillText(text, dn.x, dn.y - 1);
        ctx.fillText(text, dn.x, dn.y + 1);

        // Fill
        ctx.fillStyle = dn.isCrit ? '#FF4444' : '#F8F8F8';
        ctx.fillText(text, dn.x, dn.y);
        ctx.restore();
      }
    }

    // ==================================================================
    // CANVAS EFFECTS (screen flash, shake, slash effect)
    // ==================================================================
    let screenFlashOpacity = 0;
    let screenFlashColor = '#fff';
    let screenShakeTimer = 0;
    let screenShakeIntensity = 0;

    // Boss attack visual state
    let bossAttackScaleY = 1.0;
    let bossAttackScaleTimer = 0;

    // Attack effect sprites (per-class)
    const attackEffects = [];

    function triggerCanvasAttackEffects(attackData, targetX, targetY) {
      // Combo tracking
      comboTimer = 0;
      comboCount++;
      if (comboCount >= 2) {
        if (comboCount === 2) {
          comboDisplayText = 'DOUBLE!';
        } else if (comboCount === 3) {
          comboDisplayText = 'TRIPLE!';
        } else {
          comboDisplayText = 'CHAIN x' + comboCount + '!';
        }
        comboDisplayTimer = 1500;
        comboDisplayScale = 1.5;
        // Sparkles for CHAIN (4+ hits)
        if (comboCount >= 4) {
          spawnComboSparkles();
        }
      }

      // Screen flash
      screenFlashColor = '#fff';
      screenFlashOpacity = 0.7;

      // Class-specific attack effect at boss
      attackEffects.push({
        x: targetX + 20 + (Math.random() - 0.5) * 30,
        y: targetY + 20 + (Math.random() - 0.5) * 20,
        frame: 0,
        timer: 0,
        active: true,
        charClass: attackData.characterClass || 'warrior',
        isCrit: attackData.isCrit,
      });

      // Screen shake
      screenShakeTimer = 300;
      screenShakeIntensity = attackData.isCrit ? 5 : 3;

      // Damage number
      spawnDamageNumber(attackData.amount, targetX + 60, targetY + 40, attackData.isCrit);

      // Boss hit flash
      bossBrightness = 2.5;

      // Sound
      if (attackData.isCrit) {
        playCritSound();
      } else {
        playSlashSound();
      }
    }

    function updateEffects(dt) {
      // Combo timer decay
      comboTimer += dt;
      if (comboTimer > COMBO_WINDOW) {
        comboCount = 0;
      }
      if (comboDisplayTimer > 0) {
        comboDisplayTimer -= dt;
        // Animate scale: pop in at 1.5, settle to 1.0 over 200ms
        if (comboDisplayScale > 1.0) {
          comboDisplayScale -= dt / 200 * 0.5;
          if (comboDisplayScale < 1.0) comboDisplayScale = 1.0;
        }
      }
      // Update combo sparkles
      updateComboSparkles(dt);

      // Screen flash decay
      if (screenFlashOpacity > 0) {
        screenFlashOpacity -= dt / 150;
        if (screenFlashOpacity < 0) screenFlashOpacity = 0;
      }

      // Screen shake
      if (screenShakeTimer > 0) {
        screenShakeTimer -= dt;
        const intensity = screenShakeIntensity * (screenShakeTimer / 300);
        bossShakeX = (Math.random() - 0.5) * intensity * 2;
        bossShakeY = (Math.random() - 0.5) * intensity * 2;
        if (screenShakeTimer <= 0) {
          bossShakeX = 0;
          bossShakeY = 0;
        }
      }

      // Boss attack scaleY pulse decay
      if (bossAttackScaleTimer > 0) {
        bossAttackScaleTimer -= dt;
        if (bossAttackScaleTimer <= 0) {
          bossAttackScaleY = 1.0;
          bossAttackScaleTimer = 0;
        } else {
          // Pulse up then back down
          const t = 1 - (bossAttackScaleTimer / 400);
          bossAttackScaleY = t < 0.5 ? 1.0 + 0.1 * (t * 2) : 1.0 + 0.1 * (1 - (t - 0.5) * 2);
        }
      }

      // Boss brightness decay
      if (bossBrightness > 1) {
        bossBrightness -= dt / 100;
        if (bossBrightness < 1) bossBrightness = 1;
      }

      // Boss death animation — 1.8s dramatic sequence
      if (bossDying) {
        bossDeathTimer += dt;
        const t = bossDeathTimer / 1800; // normalized 0→1 over 1.8s
        if (t < 0.1) {
          // Phase 1: Initial bright flash + freeze
          bossBrightness = 4;
          screenFlashColor = '#fff';
          screenFlashOpacity = 0.6;
        } else if (t < 0.45) {
          // Phase 2: Rapid flicker + violent shake
          const flickerRate = 30 + (t - 0.1) * 60;
          bossBrightness = 1 + Math.abs(Math.sin(bossDeathTimer * flickerRate * 0.01)) * 2;
          const shakeIntensity = 4 + (t - 0.1) * 15;
          bossShakeX = (Math.random() - 0.5) * shakeIntensity;
          bossShakeY = (Math.random() - 0.5) * shakeIntensity;
        } else if (t < 0.5) {
          // Phase 3: Explosion — spawn particles + big flash
          if (!deathParticlesActive) {
            spawnDeathParticles();
            screenFlashOpacity = 1;
          }
          bossBrightness = 5;
          bossShakeX = (Math.random() - 0.5) * 10;
          bossShakeY = (Math.random() - 0.5) * 10;
        } else {
          // Phase 4: Boss fades out while particles fly
          bossOpacity = Math.max(0, 1 - (t - 0.5) * 2.5);
          bossBrightness = 1.5;
          bossShakeX *= 0.9;
          bossShakeY *= 0.9;
        }
        if (t >= 1) {
          bossDying = false;
          bossDeathTimer = 0;
          bossShakeX = 0;
          bossShakeY = 0;
        }
      }

      // Death particles
      updateDeathParticles(dt);
      updateRoarParticles(dt);

      // Attack effects
      for (const s of attackEffects) {
        if (!s.active) continue;
        s.timer += dt;
        s.frame = Math.floor(s.timer / 80) % 4;
        if (s.timer > 400) s.active = false;
      }
      // Trim inactive effects
      while (attackEffects.length > 20 && !attackEffects[0].active) attackEffects.shift();
    }

    function renderFlash(ctx) {
      if (screenFlashOpacity > 0) {
        ctx.save();
        ctx.globalAlpha = screenFlashOpacity;
        ctx.fillStyle = screenFlashColor;
        ctx.fillRect(0, 0, GAME_W, GAME_H);
        ctx.restore();
      }
    }

    function renderAttackEffects(ctx) {
      for (const s of attackEffects) {
        if (!s.active) continue;
        const t = s.timer / 400; // normalized 0→1
        const alpha = t < 0.3 ? t / 0.3 : 1 - (t - 0.3) / 0.7;
        const scale = s.isCrit ? 1.5 : 1;
        ctx.save();
        ctx.globalAlpha = Math.max(0, alpha);

        switch (s.charClass) {
          case 'warrior': {
            // Sword arc — white crescent sweep
            ctx.strokeStyle = '#FFFFFF';
            ctx.lineWidth = 2;
            ctx.shadowColor = '#FF6644';
            ctx.shadowBlur = 4 * scale;
            const arcAngle = t * Math.PI * 0.8;
            ctx.beginPath();
            ctx.arc(s.x + 10, s.y + 10, 12 * scale, -Math.PI * 0.6 + arcAngle * 0.5, -Math.PI * 0.6 + arcAngle, false);
            ctx.stroke();
            // Trail
            ctx.globalAlpha = alpha * 0.4;
            ctx.lineWidth = 4;
            ctx.stroke();
            break;
          }
          case 'mage': {
            // Energy burst — expanding ring of particles
            ctx.shadowColor = '#6688FF';
            ctx.shadowBlur = 6 * scale;
            const radius = 4 + t * 16 * scale;
            const count = 6;
            for (let i = 0; i < count; i++) {
              const angle = (Math.PI * 2 * i) / count + t * 3;
              const px = s.x + 10 + Math.cos(angle) * radius;
              const py = s.y + 10 + Math.sin(angle) * radius;
              ctx.fillStyle = i % 2 === 0 ? '#88AAFF' : '#FFFFFF';
              ctx.fillRect(Math.floor(px), Math.floor(py), 2, 2);
            }
            // Center flash
            if (t < 0.3) {
              ctx.globalAlpha = (1 - t / 0.3) * 0.6;
              ctx.fillStyle = '#CCDDFF';
              ctx.fillRect(s.x + 6, s.y + 6, 8, 8);
            }
            break;
          }
          case 'rogue': {
            // Dual slash — X-shaped cross cuts
            ctx.strokeStyle = '#88FF66';
            ctx.lineWidth = 1.5;
            ctx.shadowColor = '#88FF66';
            ctx.shadowBlur = 3 * scale;
            const len = 10 * t * scale;
            const cx = s.x + 10, cy = s.y + 10;
            // First slash
            ctx.beginPath();
            ctx.moveTo(cx - len, cy - len);
            ctx.lineTo(cx + len, cy + len);
            ctx.stroke();
            // Second slash (delayed)
            if (t > 0.15) {
              ctx.beginPath();
              ctx.moveTo(cx + len, cy - len);
              ctx.lineTo(cx - len, cy + len);
              ctx.stroke();
            }
            break;
          }
          case 'cleric': {
            // Holy ring — expanding golden circle
            ctx.strokeStyle = '#FFDD44';
            ctx.lineWidth = 1.5;
            ctx.shadowColor = '#FFDD44';
            ctx.shadowBlur = 5 * scale;
            const r = 3 + t * 14 * scale;
            ctx.beginPath();
            ctx.arc(s.x + 10, s.y + 10, r, 0, Math.PI * 2);
            ctx.stroke();
            // Inner cross
            if (t < 0.5) {
              const cr = r * 0.5;
              ctx.beginPath();
              ctx.moveTo(s.x + 10, s.y + 10 - cr);
              ctx.lineTo(s.x + 10, s.y + 10 + cr);
              ctx.moveTo(s.x + 10 - cr, s.y + 10);
              ctx.lineTo(s.x + 10 + cr, s.y + 10);
              ctx.stroke();
            }
            break;
          }
          case 'ranger': {
            // Arrow trail — horizontal streak with arrowhead
            ctx.strokeStyle = '#44DDFF';
            ctx.lineWidth = 1.5;
            ctx.shadowColor = '#44DDFF';
            ctx.shadowBlur = 3 * scale;
            const trailLen = 18 * scale;
            const tipX = s.x + 20 - t * 8;
            const tipY = s.y + 10;
            // Arrow shaft
            ctx.beginPath();
            ctx.moveTo(tipX - trailLen * (1 - t), tipY);
            ctx.lineTo(tipX, tipY);
            ctx.stroke();
            // Arrowhead
            if (t < 0.6) {
              ctx.beginPath();
              ctx.moveTo(tipX, tipY);
              ctx.lineTo(tipX - 4, tipY - 3);
              ctx.moveTo(tipX, tipY);
              ctx.lineTo(tipX - 4, tipY + 3);
              ctx.stroke();
            }
            break;
          }
          case 'berserker': {
            // Ground slam shockwave — expanding horizontal line with sparks
            ctx.strokeStyle = '#FF4444';
            ctx.lineWidth = 2.5;
            ctx.shadowColor = '#FF4444';
            ctx.shadowBlur = 6 * scale;
            const width = t * 24 * scale;
            const cy2 = s.y + 16;
            ctx.beginPath();
            ctx.moveTo(s.x + 10 - width, cy2);
            ctx.lineTo(s.x + 10 + width, cy2);
            ctx.stroke();
            // Impact sparks
            for (let i = 0; i < 3; i++) {
              const sx = s.x + 10 + (Math.random() - 0.5) * width * 2;
              const sy = cy2 - Math.random() * 8 * (1 - t);
              ctx.fillStyle = '#FFAA44';
              ctx.fillRect(Math.floor(sx), Math.floor(sy), 2, 2);
            }
            break;
          }
          default: {
            // Fallback — use slash sprite if available
            const img = spriteImages['slash'];
            if (img) {
              drawSprite(ctx, img, SPRITE_CONFIG.effects, 0, s.frame, s.x, s.y, 4, false);
            }
          }
        }
        ctx.restore();
      }
    }

    // ==================================================================
    // BOSS DEATH PARTICLES
    // ==================================================================
    const MAX_DEATH_PARTICLES = 40;
    const deathParticles = [];
    let deathParticlesActive = false;

    function spawnDeathParticles() {
      deathParticlesActive = true;
      const bossScale = 4;
      const cx = bossCanvasX + (SPRITE_CONFIG.bosses.frameW * bossScale) / 2;
      const cy = bossCanvasY + (SPRITE_CONFIG.bosses.frameH * bossScale) / 2;
      // Get boss archetype color for particles
      const key = getBossSpriteKey(bossState ? bossState.killCount : 0);
      const colors = ['#FF4444', '#FF8844', '#FFCC44', '#FFFFFF', '#FF6644'];
      for (let i = 0; i < MAX_DEATH_PARTICLES; i++) {
        const angle = (Math.PI * 2 * i) / MAX_DEATH_PARTICLES + (Math.random() - 0.5) * 0.5;
        const speed = 0.8 + Math.random() * 1.5;
        let p = deathParticles[i];
        if (!p) { p = {}; deathParticles[i] = p; }
        p.active = true;
        p.x = cx + (Math.random() - 0.5) * 20;
        p.y = cy + (Math.random() - 0.5) * 20;
        p.vx = Math.cos(angle) * speed;
        p.vy = Math.sin(angle) * speed - 0.5;
        p.size = 2 + Math.random() * 3;
        p.color = colors[Math.floor(Math.random() * colors.length)];
        p.opacity = 1;
        p.age = 0;
        p.maxAge = 600 + Math.random() * 600;
        p.gravity = 0.003;
      }
    }

    function updateDeathParticles(dt) {
      if (!deathParticlesActive) return;
      let anyActive = false;
      for (const p of deathParticles) {
        if (!p || !p.active) continue;
        p.age += dt;
        p.x += p.vx * dt * 0.1;
        p.y += p.vy * dt * 0.1;
        p.vy += p.gravity * dt;
        p.opacity = Math.max(0, 1 - p.age / p.maxAge);
        p.size *= 0.998;
        if (p.age >= p.maxAge) p.active = false;
        else anyActive = true;
      }
      if (!anyActive) deathParticlesActive = false;
    }

    function renderDeathParticles(ctx) {
      if (!deathParticlesActive) return;
      ctx.save();
      for (const p of deathParticles) {
        if (!p || !p.active) continue;
        ctx.globalAlpha = p.opacity;
        ctx.fillStyle = p.color;
        ctx.fillRect(Math.floor(p.x), Math.floor(p.y), Math.ceil(p.size), Math.ceil(p.size));
      }
      ctx.restore();
    }

    // ==================================================================
    // BOSS ATTACK EFFECTS (roar particles)
    // ==================================================================
    const MAX_ROAR_PARTICLES = 10;
    const roarParticles = [];
    let roarParticlesActive = false;

    function spawnRoarParticles() {
      roarParticlesActive = true;
      const bossScale = 4;
      const cx = bossCanvasX + (SPRITE_CONFIG.bosses.frameW * bossScale) / 2;
      const cy = bossCanvasY + (SPRITE_CONFIG.bosses.frameH * bossScale) / 2;
      const colors = ['#FF4444', '#FF8844', '#FFCC44', '#FFFFFF'];
      const count = 8 + Math.floor(Math.random() * 3); // 8-10
      for (let i = 0; i < count; i++) {
        const angle = (Math.PI * 2 * i) / count + (Math.random() - 0.5) * 0.5;
        const speed = 0.5 + Math.random() * 1.0;
        let p = roarParticles[i];
        if (!p) { p = {}; roarParticles[i] = p; }
        p.active = true;
        p.x = cx + (Math.random() - 0.5) * 10;
        p.y = cy + (Math.random() - 0.5) * 10;
        p.vx = Math.cos(angle) * speed;
        p.vy = Math.sin(angle) * speed - 0.3;
        p.size = 1.5 + Math.random() * 2;
        p.color = colors[Math.floor(Math.random() * colors.length)];
        p.opacity = 1;
        p.age = 0;
        p.maxAge = 400 + Math.random() * 300;
        p.gravity = 0.002;
      }
      // Deactivate extras
      for (let i = count; i < roarParticles.length; i++) {
        if (roarParticles[i]) roarParticles[i].active = false;
      }
    }

    function updateRoarParticles(dt) {
      if (!roarParticlesActive) return;
      let anyActive = false;
      for (const p of roarParticles) {
        if (!p || !p.active) continue;
        p.age += dt;
        p.x += p.vx * dt * 0.1;
        p.y += p.vy * dt * 0.1;
        p.vy += p.gravity * dt;
        p.opacity = Math.max(0, 1 - p.age / p.maxAge);
        p.size *= 0.998;
        if (p.age >= p.maxAge) p.active = false;
        else anyActive = true;
      }
      if (!anyActive) roarParticlesActive = false;
    }

    function renderRoarParticles(ctx) {
      if (!roarParticlesActive) return;
      ctx.save();
      for (const p of roarParticles) {
        if (!p || !p.active) continue;
        ctx.globalAlpha = p.opacity;
        ctx.fillStyle = p.color;
        ctx.fillRect(Math.floor(p.x), Math.floor(p.y), Math.ceil(p.size), Math.ceil(p.size));
      }
      ctx.restore();
    }

    // Trigger a boss attack visual effect
    function triggerBossAttack(attack) {
      const bossName = bossState ? bossState.name : 'Boss';

      switch (attack.type) {
        case 'aoe_slam':
          // Boss scaleY pulse
          bossAttackScaleY = 1.0;
          bossAttackScaleTimer = 400;
          // Screen shake
          screenShakeTimer = 500;
          screenShakeIntensity = 4;
          // Red-tinted screen flash
          screenFlashColor = '#FF2200';
          screenFlashOpacity = 0.3;
          // All party members play hit animation briefly
          for (const [, entry] of party) {
            if (!entry.canvasChar) continue;
            const cc = entry.canvasChar;
            cc.animRow = SPRITE_CONFIG.characters.rows.hit;
            cc.frame = 0;
            // Store ref to restore after 300ms
            setTimeout(() => {
              if (cc.state === CHAR_IDLE) {
                cc.animRow = SPRITE_CONFIG.characters.rows.idle;
                cc.frame = 0;
              }
            }, 300);
          }
          addLogEntry(`${bossName} unleashes a devastating slam!`, 'crit');
          break;

        case 'roar':
          // Boss brightness flash
          bossBrightness = 3;
          // Spawn roar particles
          spawnRoarParticles();
          // Screen shake
          screenShakeTimer = 400;
          screenShakeIntensity = 3;
          addLogEntry(`${bossName} lets out a fearsome roar!`);
          break;

        case 'targeted_strike':
          if (attack.targetTaskId) {
            const entry = party.get(attack.targetTaskId);
            if (entry && entry.canvasChar) {
              const cc = entry.canvasChar;
              // Flash brightness
              cc.brightness = 3;
              // Play hit animation
              cc.animRow = SPRITE_CONFIG.characters.rows.hit;
              cc.frame = 0;
              setTimeout(() => {
                if (cc.state === CHAR_IDLE) {
                  cc.animRow = SPRITE_CONFIG.characters.rows.idle;
                  cc.frame = 0;
                }
                cc.brightness = 1;
              }, 300);
              // Small screen shake
              screenShakeTimer = 200;
              screenShakeIntensity = 2;
              const charName = entry.task && entry.task.character ? entry.task.character.name : 'Hero';
              addLogEntry(`${bossName} strikes at ${charName}!`);
            }
          }
          break;
      }
    }

    // ==================================================================
    // CANVAS VICTORY TEXT
    // ==================================================================
    let victoryTimer = 0;
    let showingVictory = false;

    function triggerVictoryCanvas() {
      showingVictory = true;
      victoryTimer = 0;
    }

    function updateVictory(dt) {
      if (!showingVictory) return;
      victoryTimer += dt;
      if (victoryTimer >= 2500) {
        showingVictory = false;
        victoryTimer = 0;
      }
    }

    function renderVictory(ctx) {
      if (!showingVictory) return;
      const t = victoryTimer / 2500;
      let alpha = 0;
      let scale = 1;
      if (t < 0.15) {
        alpha = t / 0.15;
        scale = 0.5 + (t / 0.15) * 0.7;
      } else if (t < 0.3) {
        alpha = 1;
        scale = 1.2 - ((t - 0.15) / 0.15) * 0.2;
      } else if (t < 0.7) {
        alpha = 1;
        scale = 1;
      } else {
        alpha = 1 - (t - 0.7) / 0.3;
        scale = 1 + (t - 0.7) / 0.3 * 0.1;
      }

      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.font = '16px PressStart2P, monospace';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';

      const cx = GAME_W / 2;
      const cy = GAME_H / 2 - 20;

      // Glow
      ctx.shadowColor = 'rgba(212, 175, 55, 0.8)';
      ctx.shadowBlur = 10;

      // Outline
      ctx.fillStyle = '#000';
      for (let ox = -2; ox <= 2; ox++) {
        for (let oy = -2; oy <= 2; oy++) {
          if (ox || oy) ctx.fillText('VICTORY', cx + ox, cy + oy);
        }
      }

      ctx.fillStyle = '#FFD700';
      ctx.fillText('VICTORY', cx, cy);
      ctx.restore();
    }

    // ==================================================================
    // GAME LOOP
    // ==================================================================
    function gameLoop(timestamp) {
      if (!gameRunning) return;

      // Pause when tab is hidden
      if (document.hidden) {
        lastTime = timestamp;
        requestAnimationFrame(gameLoop);
        return;
      }

      const dt = lastTime ? Math.min(timestamp - lastTime, 100) : 16; // Cap dt to prevent spiral
      lastTime = timestamp;
      spriteTimer += dt;

      // Update sprite frames at SNES rate
      let advanceFrame = false;
      if (spriteTimer >= SPRITE_INTERVAL) {
        spriteTimer -= SPRITE_INTERVAL;
        advanceFrame = true;
      }

      // Update boss frame
      if (advanceFrame) {
        bossFrame = (bossFrame + 1) % SPRITE_CONFIG.bosses.frameCounts.idle;
      }

      // Update party characters
      for (const [, entry] of party) {
        if (!entry.canvasChar) continue;
        entry.canvasChar.update(dt);
        if (advanceFrame && entry.canvasChar.state === CHAR_IDLE) {
          const cfg = SPRITE_CONFIG.characters;
          const row = entry.canvasChar.animRow;
          const rowName = Object.keys(cfg.rows).find(k => cfg.rows[k] === row) || 'idle';
          const maxFrames = cfg.frameCounts[rowName] || 6;
          entry.canvasChar.frame = (entry.canvasChar.frame + 1) % maxFrames;
        }
        if (advanceFrame && entry.canvasChar.state === CHAR_ATTACKING) {
          entry.canvasChar.frame = Math.min(
            entry.canvasChar.frame + 1,
            SPRITE_CONFIG.characters.frameCounts.attack - 1
          );
        }
      }

      // Update boss idle animation time
      if (!bossDying) {
        bossIdleTime += dt;
      }

      // Update effects
      updateEffects(dt);
      updateDamageNumbers(dt);
      updateVictory(dt);
      updateLootDrop(dt);

      // Clean up finished unsummon animations
      for (const [id, entry] of party) {
        if (entry.canvasChar && entry.canvasChar.unsummoning && entry.canvasChar.opacity <= 0) {
          party.delete(id);
          updatePartyCount();
          rebuildStatusPanel();
        }
      }

      // --- RENDER ---
      gameCtx.clearRect(0, 0, GAME_W, GAME_H);

      // Background
      renderBackground(gameCtx, timestamp);

      // Boss
      renderBoss(gameCtx);

      // Death particles (on top of boss)
      renderDeathParticles(gameCtx);

      // Roar particles (boss attack effect)
      renderRoarParticles(gameCtx);

      // Attack effects
      renderAttackEffects(gameCtx);

      // Party characters
      const sortedParty = [...party.values()].filter(e => e.canvasChar);
      sortedParty.sort((a, b) => a.canvasChar.y - b.canvasChar.y);
      for (const entry of sortedParty) {
        entry.canvasChar.render(gameCtx);
      }

      // Damage numbers
      renderDamageNumbers(gameCtx);

      // Combo text and sparkles
      renderComboSparkles(gameCtx);
      renderCombo(gameCtx);

      // Screen flash
      renderFlash(gameCtx);

      // Victory text
      renderVictory(gameCtx);

      // Loot drop
      renderLootDrop(gameCtx);

      // Scale to display
      displayCtx.clearRect(0, 0, displayCanvas.width, displayCanvas.height);
      displayCtx.imageSmoothingEnabled = false;
      displayCtx.drawImage(offscreen, 0, 0, displayCanvas.width, displayCanvas.height);

      requestAnimationFrame(gameLoop);
    }

    // ==================================================================
    // AUDIO SYSTEM — SNES-authentic with echo
    // ==================================================================
    function initAudio() {
      if (audioCtx) return;
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();

      // Master gain
      masterGain = audioCtx.createGain();
      masterGain.gain.value = 1.0;
      masterGain.connect(audioCtx.destination);

      // SNES echo chain
      const delay = audioCtx.createDelay(1.0);
      delay.delayTime.value = 0.1;
      const feedback = audioCtx.createGain();
      feedback.gain.value = 0.3;
      const lpf = audioCtx.createBiquadFilter();
      lpf.type = 'lowpass';
      lpf.frequency.value = 4000;
      echoWet = audioCtx.createGain();
      echoWet.gain.value = 0.25;

      masterGain.connect(delay);
      delay.connect(lpf);
      lpf.connect(feedback);
      feedback.connect(delay);
      lpf.connect(echoWet);
      echoWet.connect(audioCtx.destination);
    }

    function getAudioDest() {
      return masterGain || audioCtx.destination;
    }

    // --- Sword slash (noise burst + tonal sweep) ---
    function playSlashSound() {
      if (!audioCtx || muted) return;
      const now = audioCtx.currentTime;
      const dest = getAudioDest();

      // White noise "whoosh"
      const bufSize = Math.floor(audioCtx.sampleRate * 0.15);
      const buf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
      const d = buf.getChannelData(0);
      for (let i = 0; i < bufSize; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / bufSize);
      const noise = audioCtx.createBufferSource();
      noise.buffer = buf;
      const bpf = audioCtx.createBiquadFilter();
      bpf.type = 'bandpass';
      bpf.frequency.setValueAtTime(3000, now);
      bpf.frequency.exponentialRampToValueAtTime(800, now + 0.1);
      bpf.Q.value = 2;
      const nGain = audioCtx.createGain();
      nGain.gain.setValueAtTime(0.2, now);
      nGain.gain.exponentialRampToValueAtTime(0.001, now + 0.12);
      noise.connect(bpf);
      bpf.connect(nGain);
      nGain.connect(dest);

      // Tonal "shing"
      const osc = audioCtx.createOscillator();
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(600, now);
      osc.frequency.exponentialRampToValueAtTime(200, now + 0.08);
      const oGain = audioCtx.createGain();
      oGain.gain.setValueAtTime(0.06, now);
      oGain.gain.exponentialRampToValueAtTime(0.001, now + 0.08);
      osc.connect(oGain);
      oGain.connect(dest);

      noise.start(now);
      noise.stop(now + 0.15);
      osc.start(now);
      osc.stop(now + 0.1);
    }

    // --- Critical hit (slash + sub-bass impact) ---
    function playCritSound() {
      if (!audioCtx || muted) return;
      const now = audioCtx.currentTime;
      const dest = getAudioDest();

      // Slash component (louder)
      const bufSize = Math.floor(audioCtx.sampleRate * 0.2);
      const buf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
      const d = buf.getChannelData(0);
      for (let i = 0; i < bufSize; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / bufSize);
      const noise = audioCtx.createBufferSource();
      noise.buffer = buf;
      const bpf = audioCtx.createBiquadFilter();
      bpf.type = 'bandpass';
      bpf.frequency.setValueAtTime(3500, now);
      bpf.frequency.exponentialRampToValueAtTime(600, now + 0.12);
      bpf.Q.value = 2;
      const nGain = audioCtx.createGain();
      nGain.gain.setValueAtTime(0.3, now);
      nGain.gain.exponentialRampToValueAtTime(0.001, now + 0.18);
      noise.connect(bpf);
      bpf.connect(nGain);
      nGain.connect(dest);

      // Shing (louder)
      const osc = audioCtx.createOscillator();
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(800, now);
      osc.frequency.exponentialRampToValueAtTime(200, now + 0.1);
      const oGain = audioCtx.createGain();
      oGain.gain.setValueAtTime(0.1, now);
      oGain.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
      osc.connect(oGain);
      oGain.connect(dest);

      // Sub-bass impact
      const sub = audioCtx.createOscillator();
      sub.type = 'sine';
      sub.frequency.setValueAtTime(100, now);
      sub.frequency.exponentialRampToValueAtTime(40, now + 0.15);
      const sGain = audioCtx.createGain();
      sGain.gain.setValueAtTime(0.2, now);
      sGain.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
      sub.connect(sGain);
      sGain.connect(dest);

      noise.start(now);
      noise.stop(now + 0.2);
      osc.start(now);
      osc.stop(now + 0.12);
      sub.start(now);
      sub.stop(now + 0.15);
    }

    // --- Summon (ascending sparkle + detuned chorus) ---
    function playSummonSound() {
      if (!audioCtx || muted) return;
      const now = audioCtx.currentTime;
      const dest = getAudioDest();

      // Ascending tones with slight detune for chorus
      const notes = [400, 600, 800];
      notes.forEach((freq, i) => {
        const t = now + i * 0.06;
        // Main tone
        const osc1 = audioCtx.createOscillator();
        osc1.type = 'sine';
        osc1.frequency.setValueAtTime(freq, t);
        const g1 = audioCtx.createGain();
        g1.gain.setValueAtTime(0.1, t);
        g1.gain.exponentialRampToValueAtTime(0.001, t + 0.12);
        osc1.connect(g1);
        g1.connect(dest);
        osc1.start(t);
        osc1.stop(t + 0.12);

        // Detuned second oscillator for chorus
        const osc2 = audioCtx.createOscillator();
        osc2.type = 'sine';
        osc2.frequency.setValueAtTime(freq * 1.005, t); // Slight detune
        const g2 = audioCtx.createGain();
        g2.gain.setValueAtTime(0.06, t);
        g2.gain.exponentialRampToValueAtTime(0.001, t + 0.12);
        osc2.connect(g2);
        g2.connect(dest);
        osc2.start(t);
        osc2.stop(t + 0.12);
      });

      // Noise sparkle burst
      const bufSize = Math.floor(audioCtx.sampleRate * 0.1);
      const buf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
      const d = buf.getChannelData(0);
      for (let i = 0; i < bufSize; i++) d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / bufSize, 3);
      const noise = audioCtx.createBufferSource();
      noise.buffer = buf;
      const hpf = audioCtx.createBiquadFilter();
      hpf.type = 'highpass';
      hpf.frequency.value = 6000;
      const nGain = audioCtx.createGain();
      nGain.gain.setValueAtTime(0.08, now);
      nGain.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
      noise.connect(hpf);
      hpf.connect(nGain);
      nGain.connect(dest);
      noise.start(now);
      noise.stop(now + 0.1);
    }

    // --- Level-up (ascending 4-note chime: C5→E5→G5→C6) ---
    function playLevelUpSound() {
      if (!audioCtx || muted) return;
      const now = audioCtx.currentTime;
      const dest = getAudioDest();

      const notes = [523.25, 659.25, 783.99, 1046.50]; // C5, E5, G5, C6
      notes.forEach((freq, i) => {
        const t = now + i * 0.08;
        const osc = audioCtx.createOscillator();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(freq, t);
        const g = audioCtx.createGain();
        g.gain.setValueAtTime(0.12, t);
        g.gain.exponentialRampToValueAtTime(0.001, t + 0.2);
        osc.connect(g);
        g.connect(dest);
        osc.start(t);
        osc.stop(t + 0.2);

        // Detuned chorus for shimmer
        const osc2 = audioCtx.createOscillator();
        osc2.type = 'triangle';
        osc2.frequency.setValueAtTime(freq * 1.005, t);
        const g2 = audioCtx.createGain();
        g2.gain.setValueAtTime(0.06, t);
        g2.gain.exponentialRampToValueAtTime(0.001, t + 0.2);
        osc2.connect(g2);
        g2.connect(dest);
        osc2.start(t);
        osc2.stop(t + 0.2);
      });
    }

    // --- Unsummon (descending with reverb) ---
    function playUnsummonSound() {
      if (!audioCtx || muted) return;
      const now = audioCtx.currentTime;
      const dest = getAudioDest();

        osc.stop(t + 0.15);
      });
    }

    // --- Boss death (3-layer: rumble + noise + sub-bass) ---
    function playBossDeathSound() {
      if (!audioCtx || muted) return;
      const now = audioCtx.currentTime;
      const dest = getAudioDest();

      const osc1 = audioCtx.createOscillator();
      osc1.type = 'sawtooth';
      osc1.frequency.setValueAtTime(80, now);
      osc1.frequency.exponentialRampToValueAtTime(30, now + 0.8);
      const g1 = audioCtx.createGain();
      g1.gain.setValueAtTime(0.12, now);
      g1.gain.exponentialRampToValueAtTime(0.001, now + 0.8);
      osc1.connect(g1);
      g1.connect(dest);

      const bufSize = Math.floor(audioCtx.sampleRate * 0.6);
      const buf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
      const d = buf.getChannelData(0);
      for (let i = 0; i < bufSize; i++) d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / bufSize, 2);
      const noise = audioCtx.createBufferSource();

      const nGain = audioCtx.createGain();
      nGain.gain.setValueAtTime(0.15, now);

      const sub = audioCtx.createOscillator();

      const sGain = audioCtx.createGain();

      sGain.gain.exponentialRampToValueAtTime(0.001, now + 0.5);
      sub.connect(sGain);

      osc1.start(now);
      osc1.stop(now + 0.8);
      noise.start(now);
      noise.stop(now + 0.6);
      sub.start(now);
      sub.stop(now + 0.5);

    // --- Victory fanfare (Eb Mixolydian, square waves) ---
    function playVictoryFanfare() {
      if (!audioCtx || muted) return;
      const now = audioCtx.currentTime;
      const dest = getAudioDest();

      const Bb4 = 466.16, Ab4 = 415.30, C5 = 523.25, Eb5 = 622.25;
      const melody = [
        { n: Bb4, t: 0, d: 0.12 },
        { n: Bb4, t: 0.15, d: 0.12 },
        { n: Bb4, t: 0.30, d: 0.12 },
        { n: Bb4, t: 0.45, d: 0.30 },
        { n: Ab4, t: 0.80, d: 0.15 },
        { n: Bb4, t: 1.00, d: 0.15 },
        { n: Bb4, t: 1.20, d: 0.15 },
        { n: C5, t: 1.40, d: 0.50 },
        { n: Bb4, t: 2.00, d: 0.15 },
        { n: C5, t: 2.20, d: 0.15 },
        { n: Eb5, t: 2.40, d: 0.80 },
      ];
      melody.forEach(({ n, t, d }) => {
        const osc = audioCtx.createOscillator();
        osc.type = 'square';
        osc.frequency.value = n;
        const gain = audioCtx.createGain();
        const st = now + t;
        gain.gain.setValueAtTime(0, st);
        gain.gain.linearRampToValueAtTime(0.08, st + 0.01);
        gain.gain.setValueAtTime(0.08, st + d - 0.02);
        gain.gain.linearRampToValueAtTime(0.001, st + d);
        osc.connect(gain);
        gain.connect(dest);
        osc.start(st);
        osc.stop(st + d + 0.01);
      });
    }

    // --- Boss spawn sound (triangle drone + square stab) ---
    function playBossSpawnSound() {
      if (!audioCtx || muted) return;
      const now = audioCtx.currentTime;
      const dest = getAudioDest();

      // Triangle bass drone
      const osc1 = audioCtx.createOscillator();
      osc1.type = 'triangle';
      osc1.frequency.setValueAtTime(40, now);
      osc1.frequency.exponentialRampToValueAtTime(80, now + 0.5);
      const g1 = audioCtx.createGain();
      g1.gain.setValueAtTime(0.1, now);
      g1.gain.exponentialRampToValueAtTime(0.001, now + 0.5);
      osc1.connect(g1);
      g1.connect(dest);

      // Square wave stab at the end
      const osc2 = audioCtx.createOscillator();
      osc2.type = 'square';
      osc2.frequency.setValueAtTime(150, now + 0.35);
      osc2.frequency.exponentialRampToValueAtTime(100, now + 0.5);
      const g2 = audioCtx.createGain();
      g2.gain.setValueAtTime(0, now);
      g2.gain.setValueAtTime(0.08, now + 0.35);
      g2.gain.exponentialRampToValueAtTime(0.001, now + 0.5);
      osc2.connect(g2);
      g2.connect(dest);

      osc1.start(now);
      osc1.stop(now + 0.5);
      osc2.start(now + 0.35);
      osc2.stop(now + 0.5);
    }

    // ==================================================================
    // BATTLE BGM — procedural chiptune loop
    // ==================================================================
    let bgmPlaying = false;
    let bgmGain = null;
    let bgmInterval = null;
    let bgmBeat = 0;

    // Pentatonic-minor scale notes for JRPG feel
    const BGM_BASS = [110, 110, 130.81, 146.83, 110, 110, 146.83, 130.81]; // A2 pattern
    const BGM_MELODY = [
      440, 523.25, 587.33, 523.25, 440, 392, 440, 523.25,  // phrase 1
      587.33, 659.25, 587.33, 523.25, 440, 523.25, 440, 392, // phrase 2
    ];
    const BGM_TEMPO = 180; // ms per beat (≈160 BPM)

    // Dynamic BGM intensity state
    let bgmIntensity = 'normal'; // 'sparse', 'normal', 'full'
    let bgmTempo = BGM_TEMPO;

    function getBGMIntensity() {
      const size = party.size;
      if (size <= 2) return 'sparse';
      if (size >= 5) return 'full';
      return 'normal';
    }

    function getBGMTempo() {
      if (!bossState) return BGM_TEMPO;
      const ratio = bossState.currentHP / bossState.maxHP;
      if (ratio <= 0.25) return 140;
      if (ratio <= 0.5) return 160;
      return BGM_TEMPO;
    }

    function updateBGMIntensity() {
      if (!bgmPlaying) return;
      const newIntensity = getBGMIntensity();
      const newTempo = getBGMTempo();
      bgmIntensity = newIntensity;
      // If tempo changed, restart the interval
      if (newTempo !== bgmTempo) {
        bgmTempo = newTempo;
        if (bgmInterval) {
          clearInterval(bgmInterval);
          bgmInterval = setInterval(bgmTickFn, bgmTempo);
        }
      }
    }

    // BGM tick function — extracted so we can restart the interval on tempo changes
    function bgmTickFn() {
      if (!audioCtx || muted || !bgmPlaying) return;
      const now = audioCtx.currentTime;
      const tempo = bgmTempo;

      // Bass — square wave arpeggiation (always plays)
      const bassNote = BGM_BASS[bgmBeat % BGM_BASS.length];
      const bass = audioCtx.createOscillator();
      bass.type = 'square';
      bass.frequency.setValueAtTime(bassNote, now);
      const bg = audioCtx.createGain();
      bg.gain.setValueAtTime(0.5, now);
      bg.gain.exponentialRampToValueAtTime(0.01, now + tempo / 1000 * 0.9);
      bass.connect(bg);
      bg.connect(bgmGain);
      bass.start(now);
      bass.stop(now + tempo / 1000);

      // Melody — triangle wave, plays every other beat (skip in sparse mode)
      if (bgmBeat % 2 === 0 && bgmIntensity !== 'sparse') {
        const melNote = BGM_MELODY[(bgmBeat / 2) % BGM_MELODY.length];
        const mel = audioCtx.createOscillator();
        mel.type = 'triangle';
        mel.frequency.setValueAtTime(melNote, now);
        const mg = audioCtx.createGain();
        mg.gain.setValueAtTime(0.4, now);
        mg.gain.exponentialRampToValueAtTime(0.01, now + tempo / 1000 * 1.8);
        mel.connect(mg);
        mg.connect(bgmGain);
        mel.start(now);
        mel.stop(now + tempo / 1000 * 2);

        // Harmony — major third above melody (full intensity only)
        if (bgmIntensity === 'full') {
          const harmNote = melNote * 1.25;
          const harm = audioCtx.createOscillator();
          harm.type = 'triangle';
          harm.frequency.setValueAtTime(harmNote, now);
          const hmg = audioCtx.createGain();
          hmg.gain.setValueAtTime(0.2, now);
          hmg.gain.exponentialRampToValueAtTime(0.01, now + tempo / 1000 * 1.8);
          harm.connect(hmg);
          hmg.connect(bgmGain);
          harm.start(now);
          harm.stop(now + tempo / 1000 * 2);
        }
      }

      // Hi-hat — noise on every beat, accent on 1 and 3
      const accent = (bgmBeat % 4 === 0 || bgmBeat % 4 === 2);
      const hatLen = accent ? 0.06 : 0.03;
      const hatVol = accent ? 0.25 : 0.12;
      const hatBuf = audioCtx.createBuffer(1, Math.floor(audioCtx.sampleRate * hatLen), audioCtx.sampleRate);
      const hatData = hatBuf.getChannelData(0);
      for (let i = 0; i < hatData.length; i++) {
        hatData[i] = (Math.random() * 2 - 1) * (1 - i / hatData.length);
      }
      const hat = audioCtx.createBufferSource();
      hat.buffer = hatBuf;
      const hpf = audioCtx.createBiquadFilter();
      hpf.type = 'highpass';
      hpf.frequency.value = accent ? 8000 : 10000;
      const hg = audioCtx.createGain();
      hg.gain.setValueAtTime(hatVol, now);
      hat.connect(hpf);
      hpf.connect(hg);
      hg.connect(bgmGain);
      hat.start(now);

      bgmBeat++;
    }

    function startBGM() {
      if (!audioCtx || bgmPlaying) return;
      bgmPlaying = true;
      bgmBeat = 0;
      bgmIntensity = getBGMIntensity();
      bgmTempo = getBGMTempo();

      // BGM gain node — low volume so it sits behind SFX
      bgmGain = audioCtx.createGain();
      bgmGain.gain.value = 0;
      bgmGain.connect(audioCtx.destination);
      // Fade in
      bgmGain.gain.linearRampToValueAtTime(0.06, audioCtx.currentTime + 1.5);

      bgmInterval = setInterval(bgmTickFn, bgmTempo);
    }

    function stopBGM(fadeTime) {
      if (!bgmPlaying || !bgmGain) return;
      bgmPlaying = false;
      const ft = fadeTime || 1.0;
      bgmGain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + ft);
      const interval = bgmInterval;
      const gain = bgmGain;
      setTimeout(() => {
        clearInterval(interval);
        try { gain.disconnect(); } catch(e) {}
      }, ft * 1000 + 100);
      bgmInterval = null;
      bgmGain = null;
    }
